name: Cross-platform checks

on:
  push:
  pull_request:

jobs:
  checks:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check script syntax
        run: |
          node --check scripts/smoke-test.mjs
          node --check scripts/publish-check.mjs
          node --check scripts/se-quality.mjs

      - name: Run smoke test
        run: node scripts/smoke-test.mjs

      - name: Run publish check
        run: node scripts/publish-check.mjs

      - name: Run engineering quality check
        run: node scripts/se-quality.mjs
